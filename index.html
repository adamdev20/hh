<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discord Webhook Sender</title>

<style>

body {
background:#0d1117;
font-family:system-ui;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.container {
background:#161b22;
padding:30px;
border-radius:14px;
width:430px;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

.title {
text-align:center;
font-size:22px;
margin-bottom:20px;
font-weight:600;
}

input, textarea {
width:100%;
background:#0d1117;
border:1px solid #30363d;
border-radius:8px;
padding:12px;
color:white;
margin-top:10px;
outline:none;
}

textarea {
height:120px;
resize:none;
}

.toolbar {
margin-top:10px;
}

.toolbar button {
background:#21262d;
border:none;
color:white;
padding:6px 10px;
margin:3px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.toolbar button:hover {
background:#30363d;
}

.sendBtn {
margin-top:15px;
width:100%;
background:#5865F2;
border:none;
padding:12px;
border-radius:10px;
color:white;
font-size:15px;
cursor:pointer;
}

.sendBtn:hover {
background:#4752C4;
}

.status {
text-align:center;
margin-top:10px;
font-size:13px;
opacity:.8;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
Discord Webhook Sender
</div>

<input id="webhook" placeholder="Webhook URL">

<textarea id="message" placeholder="Write your message..."></textarea>

<div class="toolbar">

<button onclick="formatText('> ')">Quote</button>
<button onclick="formatText('**','**')">Bold</button>
<button onclick="formatText('*','*')">Italic</button>
<button onclick="formatText('```','```')">Code</button>
<button onclick="formatText('@everyone ')">@everyone</button>

</div>

<button class="sendBtn" onclick="sendWebhook()">
Send Message
</button>

<div class="status" id="status"></div>

</div>

<script>

function formatText(prefix, suffix="") {

let textarea=document.getElementById("message")

let start=textarea.selectionStart
let end=textarea.selectionEnd

let selected=textarea.value.substring(start,end)

textarea.value=
textarea.value.substring(0,start)
+ prefix
+ selected
+ suffix
+ textarea.value.substring(end)

}

function sendWebhook() {

let webhook=document.getElementById("webhook").value
let message=document.getElementById("message").value

fetch(webhook,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:message
})
})
.then(()=>{
document.getElementById("status").innerText="Message sent ✅"
})
.catch(()=>{
document.getElementById("status").innerText="Failed ❌"
})

}

</script>

</body>
</html>
