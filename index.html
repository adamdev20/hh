<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webhook Terminal</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0c0c0c;
font-family: Consolas, monospace;
}

.cursor{
display:inline-block;
width:10px;
background:#fff;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

</style>
</head>

<body class="text-green-400 flex justify-center items-center min-h-screen">

<div class="w-full max-w-4xl h-[80vh] bg-black border border-green-500 shadow-2xl rounded-lg flex flex-col">

<div class="bg-green-500 text-black px-4 py-2 font-bold">
Windows PowerShell - Discord Webhook Sender
</div>

<div id="terminal" class="flex-1 overflow-y-auto p-4 text-sm space-y-1"></div>

<div class="flex px-4 pb-4">

<span class="mr-2">PS C:\Webhook&gt;</span>

<input
id="command"
class="flex-1 bg-transparent outline-none"
autofocus
/>

<span class="cursor"></span>

</div>

</div>

<script>

const terminal = document.getElementById("terminal")
const input = document.getElementById("command")

let webhookURL=""
let username="TerminalBot"
let avatar=""
let history=[]
let historyIndex=0

function log(text){
terminal.innerHTML += `<div>${text}</div>`
terminal.scrollTop = terminal.scrollHeight
}

function save(){
localStorage.setItem("webhook",webhookURL)
}

function load(){
webhookURL=localStorage.getItem("webhook")||""
}

load()

log("Webhook Terminal Ready")
log("ketik 'help' untuk daftar command")

input.addEventListener("keydown", async e=>{

if(e.key==="Enter"){

const cmd=input.value
history.push(cmd)
historyIndex=history.length

log("PS > "+cmd)

await run(cmd)

input.value=""

}

if(e.key==="ArrowUp"){
historyIndex--
if(historyIndex>=0)
input.value=history[historyIndex]
}

if(e.key==="ArrowDown"){
historyIndex++
if(historyIndex<history.length)
input.value=history[historyIndex]
}

})

async function run(command){

const args=command.split(" ")

switch(args[0]){

case "help":

log("COMMAND LIST:")
log("seturl [url]")
log("setname [name]")
log("setavatar [url]")
log("send [message]")
log("embed title|desc|color")
log("clear")
break


case "seturl":

webhookURL=args[1]
save()

log("Webhook URL saved")
break


case "setname":

username=args.slice(1).join(" ")
log("Username updated")
break


case "setavatar":

avatar=args[1]
log("Avatar updated")
break


case "send":

if(!webhookURL){

log("Webhook belum di set")
return

}

const message=args.slice(1).join(" ")

await fetch(webhookURL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
avatar_url:avatar,
content:message
})
})

log("Message sent")
break


case "embed":

if(!webhookURL){

log("Webhook belum di set")
return

}

const embedData=command.replace("embed ","").split("|")

await fetch(webhookURL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
avatar_url:avatar,
embeds:[{
title:embedData[0],
description:embedData[1],
color:Number(embedData[2])
}]
})
})

log("Embed sent")
break


case "clear":

terminal.innerHTML=""
break


default:

log("Unknown command")

}

}

</script>

</body>
</html>
