<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snyder Society</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #fff;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 30px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #fff;
    }

    .hero {
      display: flex;
      flex-direction: column;
      gap: 30px;
      align-items: center;
      text-align: center;
    }

    .hero-img img {
      width: 100%;
      max-width: 320px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    .hero-text h2 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    .hero-text p {
      font-size: 14px;
      color: #bbb;
      line-height: 1.6;
      margin-bottom: 25px;
      max-width: 400px;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #5865F2;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.25s ease;
    }

    .btn:hover {
      background: #4752c4;
      transform: translateY(-2px);
    }

    .btn:active {
      transform: scale(0.96);
    }

    footer {
      text-align: center;
      margin-top: 60px;
      font-size: 12px;
      color: #666;
    }

    /* Desktop */
    @media (min-width: 768px) {
      .hero {
        flex-direction: row;
        text-align: left;
        justify-content: space-between;
      }

      .hero-text {
        max-width: 450px;
      }

      .hero-text h2 {
        font-size: 34px;
      }
    }

  </style>
</head>
<body>

  <div class="container">

    <header>
      <h1>Snyder Society</h1>
    </header>

    <section class="hero">

      <div class="hero-img">
        <img src="https://via.placeholder.com/500x500.png?text=Your+Product" alt="Produk">
      </div>

      <div class="hero-text">
        <h2>Bypass Emulator PC</h2>
        <p>
          Solusi bypass emulator yang stabil, ringan, dan dirancang untuk performa maksimal.
          Digunakan oleh banyak user dan terus diupdate untuk menjaga keamanan.
        </p>

        <a href="https://discord.gg/qjCqApCfw" target="_blank" class="btn">
          Buy via Discord
        </a>
      </div>

    </section>

    <footer>
      © 2026 Snyder Society. All rights reserved.
    </footer>

  </div>

</body>
</html>
