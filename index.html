<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Webhook Sender</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background: linear-gradient(135deg,#0f172a,#020617);
font-family: ui-sans-serif;
}

.glass{
backdrop-filter: blur(20px);
background: rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
}
</style>

</head>
<body class="flex items-center justify-center min-h-screen text-white">

<div class="glass w-full max-w-lg rounded-2xl p-8 shadow-2xl">

<h1 class="text-3xl font-bold mb-6 text-center tracking-wide">
Discord Webhook Sender
</h1>

<label class="text-sm opacity-70">Webhook URL</label>
<input
id="webhook"
class="w-full p-3 mt-1 mb-4 rounded-lg bg-slate-900 outline-none focus:ring-2 focus:ring-indigo-500"
placeholder="https://discord.com/api/webhooks/...">

<label class="text-sm opacity-70">Username</label>
<input
id="username"
class="w-full p-3 mt-1 mb-4 rounded-lg bg-slate-900 outline-none focus:ring-2 focus:ring-indigo-500"
placeholder="Bot aesthetic kamu">

<label class="text-sm opacity-70">Pesan</label>
<textarea
id="message"
class="w-full p-3 mt-1 mb-4 rounded-lg bg-slate-900 outline-none focus:ring-2 focus:ring-indigo-500"
rows="4"
placeholder="Ketik pesan disini..."></textarea>

<button
onclick="sendWebhook()"
class="w-full bg-indigo-600 hover:bg-indigo-500 transition rounded-lg py-3 font-semibold">

Kirim Pesan 🚀

</button>

<p id="status" class="text-center mt-4 opacity-70 text-sm"></p>

<div class="mt-6 text-xs text-center opacity-40">
preview realtime ↓
</div>

<div id="preview"
class="mt-2 p-4 bg-slate-900 rounded-lg text-sm opacity-80">
Pesan akan tampil di sini...
</div>

</div>

<script>

const messageInput = document.getElementById("message")
const previewBox = document.getElementById("preview")

messageInput.addEventListener("input",()=>{
previewBox.innerText = messageInput.value || "Pesan akan tampil di sini..."
})

async function sendWebhook(){

const webhook = document.getElementById("webhook").value
const username = document.getElementById("username").value
const message = document.getElementById("message").value
const status = document.getElementById("status")

if(!webhook || !message){
status.innerText="Webhook dan pesan wajib diisi ⚠️"
return
}

status.innerText="Mengirim..."

try{

await fetch(webhook,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username: username || "Webhook Sender",
content: message
})
})

status.innerText="Pesan berhasil dikirim ✅"

}catch(err){

status.innerText="Gagal kirim ❌"

}

}

</script>

</body>
</html>
